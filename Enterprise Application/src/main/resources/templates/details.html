<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/style.css}">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<div th:replace="fragments/navbar :: navbar"></div>
<h1 th:text="${event.title}"></h1>

<p>
    <b>Tijdstip:</b>
    <span th:text="${event.eventTime}"></span>
</p>

<p>
    <b>Omschrijving:</b>
    <span th:text="${event.description}"></span>
</p>

<p>
    <b>Organisatie:</b>
    <span th:text="${event.organisation}"></span>
</p>

<p>
    <b>Contact:</b>
    <span th:text="${event.contactEmail}"></span>
</p>

<p>
    <b>Locatie:</b>
    <span th:text="${event.location.name}"></span>
</p>
