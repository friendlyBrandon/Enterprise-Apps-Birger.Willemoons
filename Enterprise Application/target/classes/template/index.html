<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Evenementen</title>
</head>
<body>

<h1>Laatste evenementen</h1>

<table border="1">

    <tr>
        <th>Titel</th>
        <th>Organisatie</th>
        <th>Details</th>
    </tr>

    <tr th:each="event : ${events}">
        <td th:text="${event.title}"></td>
        <td th:text="${event.organisation}"></td>

        <td>
            <a th:href="@{/events/{id}(id=${event.id})}">
                Bekijk
            </a>
        </td>
    </tr>

</table>

<br>

<a href="/events/new">
    Nieuw evenement
</a>

</body>
</html>
