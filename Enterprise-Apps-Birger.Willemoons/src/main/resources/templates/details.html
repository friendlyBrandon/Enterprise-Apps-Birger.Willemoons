<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Event Details</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-5">

    <!-- EVENT CARD -->
    <div class="card">

        <div class="card-body p-4">

            <!-- TITLE -->
            <h1 class="mb-3" th:text="${event.title}"></h1>

            <!-- BADGE INFO ROW -->
            <div class="mb-4">

                <span class="badge bg-primary me-2">
                    <span th:text="${event.organisation}"></span>
                </span>

                <span class="badge bg-secondary">
                    <span th:text="${event.location.name}"></span>
                </span>

            </div>

            <hr>

            <!-- DETAILS -->
            <div class="row">

                <div class="col-md-6">

                    <h5>Tijdstip</h5>
                    <p th:text="${event.eventTime}"></p>

                    <h5>Contact</h5>
                    <p th:text="${event.contactEmail}"></p>

                </div>

                <div class="col-md-6">

                    <h5>Locatie</h5>
                    <p th:text="${event.location.name}"></p>

                    <p class="text-muted">
                        <span th:text="${event.location.address}"></span>
                    </p>

                    <p>
                        Capaciteit:
                        <span th:text="${event.location.capacity}"></span>
                        personen
                    </p>

                </div>

            </div>

            <hr>

            <!-- DESCRIPTION -->
            <h5>Omschrijving</h5>

            <p class="lead" th:text="${event.description}"></p>

            <!-- ACTIONS -->
            <div class="mt-4 d-flex gap-2">

                <a href="/" class="btn btn-secondary">
                    Terug
                </a>

                <a th:href="@{/events/new}" class="btn btn-success">
                    Nieuw event
                </a>

            </div>

        </div>

    </div>

</div>

<footer class="footer">
    NGO Anderlecht © 2026
</footer>

</body>

</html>
