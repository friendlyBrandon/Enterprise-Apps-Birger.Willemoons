<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nieuw Evenement</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="page-header text-center mb-4">
                <h1>Nieuw Evenement</h1>

                <p class="text-muted">
                    Voeg een nieuw evenement toe voor de gemeenschap.
                </p>
            </div>

            <div class="card shadow-sm">

                <div class="card-body p-4">

                    <form action="/events/new" method="post">

                        <div class="mb-3">
                            <label class="form-label">
                                Titel
                            </label>

                            <input type="text"
                                   name="title"
                                   class="form-control"
                                   placeholder="Geef een titel op"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Tijdstip
                            </label>

                            <input type="datetime-local"
                                   name="eventTime"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Omschrijving
                            </label>

                            <textarea name="description"
                                      rows="5"
                                      class="form-control"
                                      placeholder="Beschrijf het evenement"
                                      required></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Organisatie
                            </label>

                            <input type="text"
                                   name="organisation"
                                   class="form-control"
                                   placeholder="Naam van de organisatie"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Contact E-mail
                            </label>

                            <input type="email"
                                   name="contactEmail"
                                   class="form-control"
                                   placeholder="voorbeeld@email.be"
                                   required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">
                                Locatie
                            </label>

                            <select name="locationId"
                                    class="form-select"
                                    required>

                                <option value="">
                                    Kies een locatie
                                </option>

                                <option th:each="location : ${locations}"
                                        th:value="${location.id}"
                                        th:text="${location.name}">
                                </option>

                            </select>
                        </div>

                        <div class="d-grid">
                            <button type="submit"
                                    class="btn btn-success btn-lg">
                                Evenement Opslaan
                            </button>
                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<footer class="footer">
    NGO Anderlecht © 2026
</footer>

</body>
</html>
