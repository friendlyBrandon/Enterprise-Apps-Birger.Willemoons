<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>NGO Anderlecht - Evenementen</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-5">

    <div class="hero-section text-center">

        <h1>Welkom bij NGO Anderlecht</h1>

        <p class="lead mt-3">
            Samen bouwen we aan een sterkere gemeenschap
            en ondersteunen we mensen die het moeilijk hebben.
        </p>

        <a href="/events/new"
           class="btn btn-light btn-lg mt-3">
            Nieuw evenement toevoegen
        </a>

    </div>

    <div class="card shadow-sm">

        <div class="card-body">

            <div class="d-flex justify-content-between align-items-center mb-4">

                <h2 class="mb-0">
                    Laatste evenementen
                </h2>

                <span class="badge bg-primary"
                      th:text="${#lists.size(events) + ' evenementen'}">
                </span>

            </div>

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-primary">

                    <tr>
                        <th>Titel</th>
                        <th>Organisatie</th>
                        <th class="text-center">Actie</th>
                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="event : ${events}">

                        <td>
                            <strong th:text="${event.title}"></strong>
                        </td>

                        <td th:text="${event.organisation}"></td>

                        <td class="text-center">

                            <a class="btn btn-primary btn-sm"
                               th:href="@{/events/{id}(id=${event.id})}">
                                Bekijk details
                            </a>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<footer class="footer">
    NGO Anderlecht © 2026
</footer>

</body>

</html>
