<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Contact</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <div class="container mt-5">
        <h1>Contacteer ons</h1>

        <p>
            Heb je vragen over onze evenementen of wil je meer informatie?
            Stuur ons een bericht via onderstaand formulier.
        </p>

        <div th:if="${success}" class="alert alert-success">
            Je bericht werd succesvol verzonden.
        </div>

        <form th:action="@{/contact}" method="post">

            <div class="mb-3">
                <label class="form-label">Naam</label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">E-mailadres</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Onderwerp</label>
                <input type="text" name="subject" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Bericht</label>
                <textarea name="message" rows="6" class="form-control" required></textarea>
            </div>

            <button type="submit" class="btn btn-primary">
                Verstuur
            </button>

        </form>
    </div>

    <footer class="footer">
        NGO Anderlecht © 2026
    </footer>

</body>

</html>
